<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🛒 CodeAlpha E-Commerce Store</h1>

    <h2>Cart Items: <span id="cart-count">0</span></h2>

    <div class="products">

        <div class="card">
            <img src="images/headphones.jpg" alt="Headphones">
            <h2>Headphones</h2>
            <p>₹999</p>
            <button onclick="addToCart('Headphones',999)">
                Add to Cart
            </button>
        </div>

        <div class="card">
            <img src="images/smartwatch.jpg" alt="Smart Watch">
            <h2>Smart Watch</h2>
            <p>₹1999</p>
            <button onclick="addToCart('Smart Watch',1999)">
                Add to Cart
            </button>
        </div>

    </div>

    <h2>🛒 Shopping Cart</h2>

    <ul id="cart-list"></ul>

    <h3>Total Price: ₹<span id="total-price">0</span></h3>

    <button onclick="removeLastItem()">
        Remove Last Item
    </button>

    <button onclick="clearCart()">
        Clear Cart
    </button>

    <script src="script.js"></script>

</body>
</html>
